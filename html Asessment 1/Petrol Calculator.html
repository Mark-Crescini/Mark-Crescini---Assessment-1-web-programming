<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="petrol calc.css">
</head>
<body>
    <!-- Main container for the petrol calculator -->
    <div class="calculator-container">
        <!-- Title of the calculator -->
        <h1>Petrol Calculator</h1>
        
        <!-- Input label and field for petrol cost per liter -->
        <label for="petrolCost">Cost per Liter (AED):</label>
        <input type="number" id="petrolCost" value="1.72" step="0.01">

        <!-- Input label and field for number of liters purchased -->
        <label for="liters">Liters Purchased:</label>
        <input type="number" id="liters" value="0" step="0.01">

        <!-- Button to trigger calculation -->
        <button id="calculateBtn">Calculate Total</button>

        <!-- Paragraph to display the total cost -->
        <p id="totalCost">Total Cost: 0.00 AED</p>
    </div>

    <!-- Link to external JavaScript file -->
    <script src="index.js"></script>
</body>
</html>
