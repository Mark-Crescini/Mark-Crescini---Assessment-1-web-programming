<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Video Example</title>
    <style>
        body {/* Set the body to fill the whole viewport and remove default margins */
            margin: 0;
            height: 100vh;
            display: flex; /* Use Flexbox to center content */
            justify-content: center; /* Horizontally center */
            align-items: center; /* Vertically center */
            background-color: #f0f0f0; /* Optional background color */
        }
        video {
            max-width: 80%; /* Keep video within 80% of viewport width */
            height: auto; /* Maintain aspect ratio */
            border: 4px solid #333; /* Optional border for styling */
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* Optional shadow */
        }
    </style>
</head>
<body>
    <video src="D:\Downloads\Seal barking clapping 720p.mp4" poster="poster.jpg" loop controls autoplay muted><!-- Local video file -->
        <!-- Video element with loop, controls, and poster image -->
        Your browser does not support the video tag.
    </video>
</body>
</html>
